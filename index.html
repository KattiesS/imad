<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif; /* Thêm font chữ cơ bản cho icon loa */
        }
        
        /* Video nền */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); 
            filter: blur(25px); 
            transition: filter 1.5s ease; 
        }

        /* Lớp phủ màn hình lúc chưa bấm */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        /* Nút Play/Mở dạng hình tròn */
        #play-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: white;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 8px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        #play-btn:hover {
            background-color: white;
            color: black;
            transform: scale(1.1);
        }

        /* ----- CSS MỚI CHO THANH ÂM LƯỢNG ----- */
        #volume-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.4); /* Nền mờ cho thanh âm lượng */
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 5;
            
            /* Ban đầu ẩn đi */
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1.5s ease; /* Hiệu ứng hiện ra mượt mà */
        }

        #volume-icon {
            font-size: 20px;
            color: white;
            user-select: none; /* Tránh bôi đen nhầm icon */
        }

        #volume-slider {
            width: 100px;
            cursor: pointer;
            accent-color: white; /* Đổi màu thanh kéo thành trắng */
        }
    </style>
</head>
<body>

    <!-- Video nền -->
    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>

    <!-- Thẻ Audio ẩn (Nhớ thay 'nhac.mp3' bằng tên file nhạc của bạn) -->
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <!-- Lớp phủ chứa nút bấm -->
    <div id="overlay">
        <!-- Nút Play (Sử dụng icon tam giác ▶) -->
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <!-- ----- GIAO DIỆN THANH ÂM LƯỢNG ----- -->
    <div id="volume-container">
        <span id="volume-icon">🔊</span>
        <!-- Thanh kéo: min là 0 (tắt tiếng), max là 1 (to nhất) -->
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
    </div>

    <!-- Script xử lý hiệu ứng -->
    <script>
        // Khai báo các phần tử trên web
        var music = document.getElementById("bg-music");
        var video = document.getElementById("bg-video");
        var overlay = document.getElementById("overlay");
        
        var volumeContainer = document.getElementById("volume-container");
        var volumeSlider = document.getElementById("volume-slider");
        var volumeIcon = document.getElementById("volume-icon");

        function startExperience() {
            // 1. Phát nhạc
            music.play();
            
            // 2. Xóa độ mờ của video (từ 25px về 0px)
            video.style.filter = "blur(0px)";
            
            // 3. Làm mờ lớp phủ màu đen đi
            overlay.style.opacity = "0";

            // 4. Hiện thanh âm lượng lên
            volumeContainer.style.opacity = "1";
            volumeContainer.style.pointerEvents = "auto";
            
            // 5. Xóa hẳn lớp phủ sau khi hiệu ứng tan biến hoàn tất (sau 1 giây)
            setTimeout(function() {
                overlay.style.display = "none";
            }, 1000);
        }

        // ----- LỆNH XỬ LÝ KHI KÉO THANH ÂM LƯỢNG -----
        volumeSlider.addEventListener("input", function() {
            // Chỉnh âm lượng nhạc bằng giá trị của thanh kéo (từ 0 đến 1)
            music.volume = this.value;
            
            // Đổi icon loa tương ứng với độ to nhỏ
            if (this.value == 0) {
                volumeIcon.textContent = "🔇";
            } else if (this.value < 0.5) {
                volumeIcon.textContent = "🔉";
            } else {
                volumeIcon.textContent = "🔊";
            }
        });
    </script>

</body>
</html>
