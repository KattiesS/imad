<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        
        /* Video nền */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); 
            filter: blur(25px); 
            transition: filter 1.5s ease; 
        }

        /* Lớp phủ màn hình lúc chưa bấm */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        /* Nút Play/Mở dạng hình tròn */
        #play-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 35px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 8px;
            backdrop-filter: blur(10px);
            transition: 0.4s;
        }
        
        #play-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* ----- CSS MỚI: CỤM ÂM LƯỢNG BÊN TRÁI ----- */
        #volume-wrapper {
            position: absolute;
            top: 50%; 
            left: 40px; /* Đổi sang mép trái */
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 5;
            
            /* Ban đầu ẩn đi trước khi bấm Play */
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        /* Nút Icon Loa (Kính mờ) */
        #volume-icon {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            user-select: none;
            
            /* Hiệu ứng kính mờ cho Icon */
            background-color: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        #volume-icon:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* Khung chứa thanh kéo âm lượng */
        #volume-slider-container {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 15px 10px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            
            /* Ban đầu ẩn thanh kéo */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px); /* Trượt nhẹ lên trên khi ẩn */
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); /* Hiệu ứng mượt */
        }

        /* Class được thêm vào khi click để hiện thanh kéo */
        #volume-slider-container.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #volume-slider {
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical; 
            width: 6px; 
            height: 100px; 
            cursor: pointer;
            accent-color: rgba(255, 255, 255, 0.8); 
        }
    </style>
</head>
<body>

    <!-- Video nền -->
    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>

    <!-- Thẻ Audio ẩn -->
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <!-- Lớp phủ chứa nút bấm -->
    <div id="overlay">
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <!-- ----- GIAO DIỆN THANH ÂM LƯỢNG ----- -->
    <div id="volume-wrapper">
        <!-- Nút loa kính mờ -->
        <div id="volume-icon" onclick="toggleVolumeSlider()">🔊</div>
        
        <!-- Hộp chứa thanh kéo (Bị ẩn, hiện ra khi click nút loa) -->
        <div id="volume-slider-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" orient="vertical">
        </div>
    </div>

    <!-- Script xử lý hiệu ứng -->
    <script>
        var music = document.getElementById("bg-music");
        var video = document.getElementById("bg-video");
        var overlay = document.getElementById("overlay");
        
        var volumeWrapper = document.getElementById("volume-wrapper");
        var volumeSliderContainer = document.getElementById("volume-slider-container");
        var volumeSlider = document.getElementById("volume-slider");
        var volumeIcon = document.getElementById("volume-icon");

        function startExperience() {
            music.play();
            video.style.filter = "blur(0px)";
            overlay.style.opacity = "0";

            // Hiện cụm âm lượng lên (nhưng thanh kéo vẫn ẩn chờ click)
            volumeWrapper.style.opacity = "1";
            volumeWrapper.style.pointerEvents = "auto";
            
            setTimeout(function() {
                overlay.style.display = "none";
            }, 1000);
        }

        // Lệnh để Bật/Tắt (Hiện/Ẩn) thanh trượt khi bấm vào Icon Loa
        function toggleVolumeSlider() {
            volumeSliderContainer.classList.toggle("active");
        }

        // Lệnh xử lý khi kéo thanh âm lượng
        volumeSlider.addEventListener("input", function() {
            music.volume = this.value;
            
            if (this.value == 0) {
                volumeIcon.textContent = "🔇";
            } else if (this.value < 0.5) {
                volumeIcon.textContent = "🔉";
            } else {
                volumeIcon.textContent = "🔊";
            }
        });
    </script>

</body>
</html>
