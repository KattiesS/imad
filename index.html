<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black; /* Nền đen */
            
            /* Dùng Flexbox để căn giữa video vào giữa màn hình */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        video {
            /* Giới hạn kích thước tối đa để không bị vỡ ảnh */
            max-width: 100%;
            max-height: 100%;
            /* Bỏ object-fit: cover đi */
        }
    </style>
</head>
<body>

    <video src="marin1.mp4" autoplay loop muted playsinline></video>

</body>
</html>
