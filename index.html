<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        
        /* Video nền */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); 
            filter: blur(25px); 
            transition: filter 1.5s ease; 
        }

        /* Lớp phủ màn hình lúc chưa bấm */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        /* Nút Play/Mở dạng hình tròn */
        #play-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: white;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 8px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        #play-btn:hover {
            background-color: white;
            color: black;
            transform: scale(1.1);
        }

        /* =========================================
           CSS MỚI: THANH ÂM LƯỢNG TRƯỢT NGANG GIỐNG ẢNH
           ========================================= */
        #volume-wrapper {
            position: absolute;
            bottom: 40px; /* Đặt ở góc dưới */
            left: 40px;   /* Bên trái màn hình */
            display: flex;
            align-items: center;
            z-index: 5;
            
            /* Ban đầu ẩn đi chờ bấm nút Play */
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        /* Icon Loa vẽ bằng SVG cho nét thanh mảnh giống ảnh */
        .speaker-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #cccccc; /* Màu xám sáng */
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
            transition: stroke 0.3s ease;
        }

        #volume-wrapper:hover .speaker-icon {
            stroke: #ffffff; /* Trắng sáng lên khi rê chuột vào */
        }

        /* Hộp chứa thanh kéo (Ban đầu độ rộng = 0 để giấu đi) */
        #volume-slider-container {
            width: 0;
            overflow: hidden;
            margin-left: 0;
            /* Hiệu ứng trượt ra trượt vào mượt mà */
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1), margin-left 0.4s ease;
            display: flex;
            align-items: center;
        }

        /* Lệnh mở rộng thanh kéo khi tương tác (rê chuột vào nguyên cụm) */
        #volume-wrapper:hover #volume-slider-container {
            width: 100px; /* Độ dài thanh kéo khi trượt ra */
            margin-left: 15px; /* Cách icon loa một đoạn */
        }

        /* Thiết kế lại hoàn toàn ngoại hình của thanh kéo (Khớp với ảnh) */
        input[type="range"] {
            -webkit-appearance: none; /* Xóa style mặc định */
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3); /* Nền xám mờ */
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        /* Giấu cục tròn (thumb) đi để trông phẳng y hệt ảnh */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 0;
            height: 0;
        }
        input[type="range"]::-moz-range-thumb {
            width: 0;
            height: 0;
            border: none;
        }
    </style>
</head>
<body>

    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>

    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <div id="overlay">
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <div id="volume-wrapper">
        <svg class="speaker-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        
        <div id="volume-slider-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <script>
        var music = document.getElementById("bg-music");
        var video = document.getElementById("bg-video");
        var overlay = document.getElementById("overlay");
        
        var volumeWrapper = document.getElementById("volume-wrapper");
        var volumeSlider = document.getElementById("volume-slider");

        // Khởi tạo màu trắng lấp đầy 100% thanh kéo ngay từ đầu
        volumeSlider.style.background = `linear-gradient(to right, white 100%, rgba(255, 255, 255, 0.3) 100%)`;

        function startExperience() {
            // 1. Phát nhạc
            music.play();
            
            // 2. Xóa độ mờ của video (từ 25px về 0px)
            video.style.filter = "blur(0px)";
            
            // 3. Làm mờ lớp phủ màu đen đi
            overlay.style.opacity = "0";
            
            // 4. Cho cụm loa hiện lên màn hình (nhưng thanh kéo vẫn ẩn gọn bên trong)
            volumeWrapper.style.opacity = "1";
            volumeWrapper.style.pointerEvents = "auto";
            
            // 5. Xóa hẳn lớp phủ sau khi hiệu ứng tan biến hoàn tất
            setTimeout(function() {
                overlay.style.display = "none";
            }, 1000);
        }

        // Lệnh đổi phần trăm trắng/xám theo thời gian thực khi kéo thanh âm thanh
        volumeSlider.addEventListener("input", function() {
            music.volume = this.value; // Chỉnh âm lượng thực tế
            
            // Tính toán phần trăm (từ 0 đến 1 -> 0% đến 100%)
            var percentage = this.value * 100;
            
            // Cập nhật lại màu nền: Trắng cho phần đã kéo, Xám mờ cho phần chưa kéo
            this.style.background = `linear-gradient(to right, white ${percentage}%, rgba(255, 255, 255, 0.3) ${percentage}%)`;
        });
    </script>

</body>
</html>
