<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Music Player</title>
    <style>
        :root {
            --accent-color: #ff007f;    /* Màu hồng Neon chủ đạo */
            --secondary-color: #ffaa00; /* Màu cam vàng cho các điểm nhấn */
            --bg-overlay: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #050505; font-family: 'Segoe UI', sans-serif;
        }
        
        #bg-video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scale(1.1); filter: blur(25px); transition: filter 1.5s ease; 
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-overlay); display: flex;
            justify-content: center; align-items: center; z-index: 10; transition: opacity 1s ease;
        }

        #play-btn {
            background: transparent; border: 2px solid var(--accent-color);
            border-radius: 50%; width: 80px; height: 80px;
            color: var(--accent-color); font-size: 30px; cursor: pointer;
            box-shadow: 0 0 15px var(--accent-color); transition: 0.3s;
        }
        #play-btn:hover { background: var(--accent-color); color: white; box-shadow: 0 0 30px var(--accent-color); }

        #player-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            width: 750px; max-width: 95%; z-index: 5;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease;
        }

        .controls-row { display: flex; align-items: center; gap: 25px; margin-bottom: 15px; }

        .skip-icon { width: 20px; height: 20px; fill: #aaa; cursor: pointer; transition: 0.3s; }
        .skip-icon:hover { fill: var(--accent-color); }

        #center-play-btn {
            width: 50px; height: 50px; background: var(--accent-color);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px var(--accent-color);
        }
        #center-play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent-color); }
        .center-icon { width: 20px; height: 20px; fill: white; }

        /* Style thanh trượt chung */
        input[type="range"] {
            -webkit-appearance: none; height: 4px;
            background: rgba(255, 255, 255, 0.1); border-radius: 2px; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: white; border-radius: 50%;
            opacity: 0; transition: 0.2s;
        }
        #player-wrapper:hover input[type="range"]::-webkit-slider-thumb { opacity: 1; }

        .time-text { color: white; font-size: 12px; min-width: 35px; text-align: center; }

        .speaker-icon { width: 24px; height: 24px; fill: none; stroke: #aaa; stroke-width: 2; transition: 0.3s; }
        #volume-wrapper:hover .speaker-icon { stroke: var(--secondary-color); }
        
        #volume-slider-container { width: 0; overflow: hidden; transition: 0.4s; }
        #volume-wrapper:hover #volume-slider-container { width: 100px; margin-left: 10px; }
        #volume-slider { width: 100px; }
    </style>
</head>
<body>

    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <div id="overlay">
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <div id="player-wrapper">
        <div class="controls-row">
            <svg class="skip-icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            <div id="center-play-btn" onclick="togglePlayPause()">
                <svg class="center-icon" viewBox="0 0 24 24"><path id="icon-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
            <svg class="skip-icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </div>
        
        <div class="bottom-bar" style="display:flex; align-items:center; width:100%;">
            <div style="width:140px;"></div>
            <div class="progress-row" style="flex-grow:1; display:flex; align-items:center; gap:15px; padding:0 15px;">
                <span id="current-time" class="time-text">0:00</span>
                <input type="range" id="progress-slider" min="0" max="100" value="0" style="flex-grow:1;">
                <span id="total-time" class="time-text">0:00</span>
            </div>
            <div id="volume-wrapper" style="width:140px; display:flex; align-items:center;">
                <svg class="speaker-icon" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <div id="volume-slider-container">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById("bg-music");
        const video = document.getElementById("bg-video");
        const overlay = document.getElementById("overlay");
        const playerWrapper = document.getElementById("player-wrapper");
        const progressSlider = document.getElementById("progress-slider");
        const volumeSlider = document.getElementById("volume-slider");
        const iconPath = document.getElementById("icon-path");
        const currentTimeEl = document.getElementById("current-time");
        const totalTimeEl = document.getElementById("total-time");

        function startExperience() {
            music.play(); video.style.filter = "blur(0px)";
            overlay.style.opacity = "0";
            playerWrapper.style.opacity = "1"; playerWrapper.style.pointerEvents = "auto";
            setTimeout(() => overlay.style.display = "none", 1000);
        }

        // Cập nhật màu tiến trình (Chỉ áp dụng cho progress-slider)
        music.addEventListener("timeupdate", () => {
            if(!music.duration) return;
            const percent = (music.currentTime / music.duration) * 100;
            progressSlider.value = percent;
            currentTimeEl.textContent = formatTime(music.currentTime);
            progressSlider.style.background = `linear-gradient(to right, var(--accent-color) ${percent}%, rgba(255, 255, 255, 0.1) ${percent}%)`;
        });

        progressSlider.addEventListener("input", function() {
            music.currentTime = (this.value / 100) * music.duration;
            this.style.background = `linear-gradient(to right, var(--accent-color) ${this.value}%, rgba(255, 255, 255, 0.1) ${this.value}%)`;
        });

        // Volume không thay đổi background
        volumeSlider.addEventListener("input", function() {
            music.volume = this.value;
        });

        function formatTime(s) {
            let m = Math.floor(s/60); let sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0'+sec : sec}`;
        }

        music.addEventListener("loadedmetadata", () => totalTimeEl.textContent = formatTime(music.duration));

        function togglePlayPause() {
            if (music.paused) { music.play(); iconPath.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z"); } 
            else { music.pause(); iconPath.setAttribute("d", "M8 5v14l11-7z"); }
        }
    </script>
</body>
</html>
