<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        
        /* Video nền */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); 
            filter: blur(25px); 
            transition: filter 1.5s ease; 
        }

        /* Lớp phủ màn hình lúc chưa bấm */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        /* Nút Play/Mở dạng hình tròn */
        #play-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: white;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 8px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        #play-btn:hover {
            background-color: white;
            color: black;
            transform: scale(1.1);
        }

        /* =========================================
           CỤM GIAO DIỆN PHÁT NHẠC TỔNG THỂ
           ========================================= */
        #player-wrapper {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 750px; /* Đủ rộng cho cả Timeline và Loa */
            max-width: 95%;
            z-index: 5;
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        /* Hàng chứa các nút bấm (Prev - Play - Next) */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 15px;
        }

        .skip-icon {
            width: 20px;
            height: 20px;
            fill: #999;
            cursor: pointer;
            transition: fill 0.3s;
        }
        .skip-icon:hover { fill: #fff; }

        #center-play-btn {
            width: 45px;
            height: 45px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #center-play-btn:hover { transform: scale(1.1); }
        
        .center-icon {
            width: 20px;
            height: 20px;
            fill: black;
        }

        /* =========================================
           HÀNG CHỨA TIMELINE + LOA (Bố cục 3 phần cân bằng)
           ========================================= */
        .bottom-bar {
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* 1. Cục Spacer tàng hình bên trái (Giúp tạo lực đẩy cân bằng hoàn hảo với cục Loa bên phải) */
        .balance-spacer {
            width: 140px; 
        }

        /* 2. Cụm thanh tua nhạc nằm chính giữa */
        .progress-row {
            flex-grow: 1; /* Tự động kéo dài chiếm không gian trống ở giữa */
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 15px;
        }

        .time-text {
            color: #d1d1d1;
            font-size: 13px;
            min-width: 35px;
            text-align: center;
            user-select: none;
        }

        /* Dùng chung CSS cho thanh kéo (Tua nhạc & Âm lượng) */
        input[type="range"] {
            -webkit-appearance: none;
            height: 4px; 
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 0; height: 0;
        }
        input[type="range"]::-moz-range-thumb {
            width: 0; height: 0; border: none;
        }

        /* Tùy biến cục tròn Youtube cho thanh tua nhạc */
        #progress-slider {
            flex-grow: 1; 
        }
        #progress-slider::-webkit-slider-thumb {
            width: 10px; height: 10px;
            background: white; border-radius: 50%;
            opacity: 0; transition: opacity 0.2s;
        }
        #player-wrapper:hover #progress-slider::-webkit-slider-thumb { opacity: 1; }

        /* 3. Cụm loa nằm bên phải (Được chốt cứng kích thước để khi trượt không bị giật khung) */
        #volume-wrapper {
            width: 140px; 
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .speaker-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #cccccc; 
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
            transition: stroke 0.3s ease;
        }
        #volume-wrapper:hover .speaker-icon { stroke: #ffffff; }

        #volume-slider-container {
            width: 0;
            overflow: hidden;
            margin-left: 0;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1), margin-left 0.4s ease;
            display: flex;
            align-items: center;
        }
        #volume-wrapper:hover #volume-slider-container {
            width: 100px; 
            margin-left: 15px; 
        }
        #volume-slider { width: 100px; }
    </style>
</head>
<body>

    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <div id="overlay">
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <div id="player-wrapper">
        
        <div class="controls-row">
            <svg class="skip-icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            
            <div id="center-play-btn" onclick="togglePlayPause()">
                <svg id="play-pause-icon" class="center-icon" viewBox="0 0 24 24">
                    <path id="icon-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </div>
            
            <svg class="skip-icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </div>
        
        <div class="bottom-bar">
            <div class="balance-spacer"></div>
            
            <div class="progress-row">
                <span id="current-time" class="time-text">0:00</span>
                <input type="range" id="progress-slider" min="0" max="100" value="0">
                <span id="total-time" class="time-text">0:00</span>
            </div>
            
            <div id="volume-wrapper">
                <svg class="speaker-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
                <div id="volume-slider-container">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
        </div>
    </div>

    <script>
        var music = document.getElementById("bg-music");
        var video = document.getElementById("bg-video");
        var overlay = document.getElementById("overlay");
        
        var playerWrapper = document.getElementById("player-wrapper");
        var volumeSlider = document.getElementById("volume-slider");
        
        var progressSlider = document.getElementById("progress-slider");
        var currentTimeEl = document.getElementById("current-time");
        var totalTimeEl = document.getElementById("total-time");
        var iconPath = document.getElementById("icon-path");

        // Set màu thanh âm lượng ban đầu (100%)
        volumeSlider.style.background = `linear-gradient(to right, white 100%, rgba(255, 255, 255, 0.3) 100%)`;

        // ==========================================
        // 1. HÀM MỞ MÀN KHỞI CHẠY WEB
        // ==========================================
        function startExperience() {
            music.play();
            video.style.filter = "blur(0px)";
            overlay.style.opacity = "0";
            
            // Chỉ cần gọi hiện toàn bộ cụm nhạc (cả loa và timeline đi kèm luôn)
            playerWrapper.style.opacity = "1";
            playerWrapper.style.pointerEvents = "auto";
            
            setTimeout(function() { overlay.style.display = "none"; }, 1000);
        }

        // ==========================================
        // 2. HÀM XỬ LÝ ÂM LƯỢNG
        // ==========================================
        volumeSlider.addEventListener("input", function() {
            music.volume = this.value;
            var percentage = this.value * 100;
            this.style.background = `linear-gradient(to right, white ${percentage}%, rgba(255, 255, 255, 0.3) ${percentage}%)`;
        });

        // ==========================================
        // 3. HÀM XỬ LÝ THANH PHÁT NHẠC (TIMELINE)
        // ==========================================
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        music.addEventListener("loadedmetadata", function() {
            totalTimeEl.textContent = formatTime(music.duration);
        });

        music.addEventListener("timeupdate", function() {
            if(music.duration) {
                var currentPercent = (music.currentTime / music.duration) * 100;
                progressSlider.value = currentPercent;
                currentTimeEl.textContent = formatTime(music.currentTime);
                progressSlider.style.background = `linear-gradient(to right, white ${currentPercent}%, rgba(255, 255, 255, 0.3) ${currentPercent}%)`;
            }
        });

        progressSlider.addEventListener("input", function() {
            var seekTime = (this.value / 100) * music.duration;
            music.currentTime = seekTime;
            this.style.background = `linear-gradient(to right, white ${this.value}%, rgba(255, 255, 255, 0.3) ${this.value}%)`;
        });

        function togglePlayPause() {
            if (music.paused) {
                music.play();
                iconPath.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z"); 
            } else {
                music.pause();
                iconPath.setAttribute("d", "M8 5v14l11-7z");
            }
        }
    </script>

</body>
</html>
