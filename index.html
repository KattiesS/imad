<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Music Player</title>
    <style>
        :root {
            --accent-color: #ff007f;
            --secondary-color: #ffaa00;
            --bg-overlay: rgba(0, 0, 0, 0.6);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Hiệu ứng nghiêng lắc lư 3D khi hover */
        @keyframes tiltRock {
            0% { transform: rotateX(15deg) rotateY(-15deg); }
            50% { transform: rotateX(10deg) rotateY(15deg); }
            100% { transform: rotateX(15deg) rotateY(-15deg); }
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        
        #bg-video { width: 100%; height: 100%; object-fit: cover; transform: scale(1.1); filter: blur(25px); transition: filter 1.5s ease; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-overlay); display: flex; justify-content: center; align-items: center; z-index: 10; transition: opacity 1s ease; }

        #play-btn { background: transparent; border: 2px solid var(--accent-color); border-radius: 50%; width: 80px; height: 80px; color: var(--accent-color); font-size: 30px; cursor: pointer; box-shadow: 0 0 15px var(--accent-color); transition: 0.3s; }
        #play-btn:hover { background: var(--accent-color); color: white; box-shadow: 0 0 30px var(--accent-color); }

        #player-wrapper { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; width: 750px; max-width: 95%; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }

        .controls-row { display: flex; align-items: center; gap: 50px; margin-bottom: 30px; }

        /* Bọc đĩa nhạc để xử lý không gian 3D */
        .disc-container {
            perspective: 1000px;
            perspective-origin: center;
            transition: transform 0.5s ease;
        }

        /* Khi rê chuột vào, kích hoạt animation nghiêng lắc lư */
        .disc-container:hover {
            animation: tiltRock 2.5s ease-in-out infinite;
        }

        /* Đĩa nhạc lớn bên trong */
        #disc-img {
            width: 180px; height: 180px; border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.2);
            cursor: pointer; transition: box-shadow 0.3s;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
            object-fit: cover;
            animation: spin 4s linear infinite;
            animation-play-state: paused; /* Mặc định đứng yên */
            display: block;
        }
        
        .is-spinning {
            animation-play-state: running !important; /* Khi phát thì quay tiếp */
        }
        
        .skip-icon { width: 35px; height: 35px; fill: #aaa; cursor: pointer; transition: 0.3s; }
        .skip-icon:hover { fill: var(--accent-color); }

        input[type="range"] { -webkit-appearance: none; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; opacity: 0; transition: 0.2s; }
        #player-wrapper:hover input[type="range"]::-webkit-slider-thumb { opacity: 1; }

        .time-text { color: white; font-size: 12px; min-width: 35px; text-align: center; }
        .speaker-icon { width: 24px; height: 24px; fill: none; stroke: #aaa; stroke-width: 2; transition: 0.3s; }
        #volume-wrapper:hover .speaker-icon { stroke: var(--secondary-color); }
        #volume-slider-container { width: 0; overflow: hidden; transition: 0.4s; }
        #volume-wrapper:hover #volume-slider-container { width: 100px; margin-left: 10px; }
        #volume-slider { width: 100px; }

        /* KHUNG KÍNH MỜ GÓC TRÁI DƯỚI */
        #track-info-box {
            position: absolute;
            bottom: 30px;
            left: 40px;
            z-index: 5;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--accent-color); /* Tạo một vạch nhấn neon ở cạnh trái */
            border-radius: 8px;
            padding: 15px 25px;
            min-width: 200px;
            max-width: 300px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease, transform 1.5s ease;
            transform: translateY(10px); /* Nhấc nhẹ khi xuất hiện */
        }
        .track-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }
        .track-artist {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <div id="overlay">
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <!-- KHUNG KÍNH MỜ THÔNG TIN BÀI HÁT -->
    <div id="track-info-box">
        <p class="track-title">『HIDE AND SEEK』</p>
        <p class="track-artist"> i-dle</p>
    </div>

    <div id="player-wrapper">
        <div class="controls-row">
            <svg class="skip-icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            
            <div class="disc-container">
                <img id="disc-img" src="disc.jpg" onclick="togglePlayPause()" alt="Vinyl Record">
            </div>
            
            <svg class="skip-icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </div>
        
        <div class="bottom-bar" style="display:flex; align-items:center; width:100%;">
            <div style="width:140px;"></div>
            <div class="progress-row" style="flex-grow:1; display:flex; align-items:center; gap:15px; padding:0 15px;">
                <span id="current-time" class="time-text">0:00</span>
                <input type="range" id="progress-slider" min="0" max="100" value="0" style="flex-grow:1;">
                <span id="total-time" class="time-text">0:00</span>
            </div>
            <div id="volume-wrapper" style="width:140px; display:flex; align-items:center;">
                <svg class="speaker-icon" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                <div id="volume-slider-container">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById("bg-music");
        const video = document.getElementById("bg-video");
        const overlay = document.getElementById("overlay");
        const playerWrapper = document.getElementById("player-wrapper");
        const discImg = document.getElementById("disc-img");
        const progressSlider = document.getElementById("progress-slider");
        const volumeSlider = document.getElementById("volume-slider");
        const currentTimeEl = document.getElementById("current-time");
        const totalTimeEl = document.getElementById("total-time");
        const trackInfoBox = document.getElementById("track-info-box");

        function startExperience() {
            music.play();
            video.style.filter = "blur(0px)";
            overlay.style.opacity = "0";
            playerWrapper.style.opacity = "1"; 
            playerWrapper.style.pointerEvents = "auto";
            
            // Hiện khung thông tin bài hát đồng bộ mượt mà
            trackInfoBox.style.opacity = "1";
            trackInfoBox.style.pointerEvents = "auto";
            trackInfoBox.style.transform = "translateY(0)";

            discImg.classList.add("is-spinning");
            setTimeout(() => overlay.style.display = "none", 1000);
        }

        function togglePlayPause() {
            if (music.paused) { 
                music.play(); 
                discImg.classList.add("is-spinning"); 
            } else { 
                music.pause(); 
                discImg.classList.remove("is-spinning"); 
            }
        }

        music.addEventListener("timeupdate", () => {
            if(!music.duration) return;
            const percent = (music.currentTime / music.duration) * 100;
            progressSlider.value = percent;
            currentTimeEl.textContent = formatTime(music.currentTime);
            progressSlider.style.background = `linear-gradient(to right, var(--accent-color) ${percent}%, rgba(255, 255, 255, 0.1) ${percent}%)`;
        });

        progressSlider.addEventListener("input", function() {
            music.currentTime = (this.value / 100) * music.duration;
            this.style.background = `linear-gradient(to right, var(--accent-color) ${this.value}%, rgba(255, 255, 255, 0.1) ${this.value}%)`;
        });

        volumeSlider.addEventListener("input", function() { music.volume = this.value; });
        function formatTime(s) { let m = Math.floor(s/60); let sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0'+sec : sec}`; }
        music.addEventListener("loadedmetadata", () => totalTimeEl.textContent = formatTime(music.duration));
    </script>
</body>
</html>
