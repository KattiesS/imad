<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        
        /* Video nền */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Phóng to video lên một xíu để viền mờ không bị lộ viền đen */
            transform: scale(1.1); 
            /* Làm mờ video thật nhiều lúc ban đầu */
            filter: blur(25px); 
            /* Hiệu ứng mờ dần đi trong 1.5 giây khi được mở */
            transition: filter 1.5s ease; 
        }

        /* Lớp phủ màn hình lúc chưa bấm */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Phủ một lớp màu đen mờ để làm nổi bật nút bấm */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease; /* Hiệu ứng biến mất mượt mà */
        }

        /* Nút Play/Mở dạng hình tròn */
        #play-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: white;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 8px; /* Đẩy icon Play ra giữa một chút cho cân đối */
            backdrop-filter: blur(5px); /* Làm mờ nhẹ bên dưới cái nút */
            transition: 0.3s;
        }
        
        /* Hiệu ứng khi rê chuột vào nút */
        #play-btn:hover {
            background-color: white;
            color: black;
            transform: scale(1.1); /* Phóng to nhẹ */
        }
    </style>
</head>
<body>

    <!-- Video nền -->
    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>

    <!-- Thẻ Audio ẩn (Nhớ thay 'nhac.mp3' bằng tên file nhạc của bạn) -->
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <!-- Lớp phủ chứa nút bấm -->
    <div id="overlay">
        <!-- Nút Play (Sử dụng icon tam giác ▶) -->
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <!-- Script xử lý hiệu ứng -->
    <script>
        function startExperience() {
            var music = document.getElementById("bg-music");
            var video = document.getElementById("bg-video");
            var overlay = document.getElementById("overlay");
            
            // 1. Phát nhạc
            music.play();
            
            // 2. Xóa độ mờ của video (từ 25px về 0px)
            video.style.filter = "blur(0px)";
            
            // 3. Làm mờ lớp phủ màu đen đi
            overlay.style.opacity = "0";
            
            // 4. Xóa hẳn lớp phủ sau khi hiệu ứng tan biến hoàn tất (sau 1 giây)
            setTimeout(function() {
                overlay.style.display = "none";
            }, 1000);
        }
    </script>

</body>
</html>
