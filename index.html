<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imad</title>
    <link rel="icon" href="tomato.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #ff007f;
            --secondary-color: #ffaa00;
            --bg-overlay: rgba(0, 0, 0, 0.6);
            /* Màu dây xích */
            --chain-color: #888;
            --chain-dark: #444;
        }

        /* Hoạt ảnh xoay đĩa mượt mà */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Hoạt ảnh bay bổng cho lyric */
        @keyframes levitate {
            0%, 100% { transform: translateY(-10px); }
            50% { transform: translateY(-18px); }
        }

        /* --- Hoạt ảnh đung đưa tự động mặc định --- */
        @keyframes sway {
            0% { transform: rotate(3deg); }
            50% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        
        #bg-video { width: 100%; height: 100%; object-fit: cover; transform: scale(1.1); filter: blur(25px); transition: filter 1.5s ease; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-overlay); display: flex; justify-content: center; align-items: center; z-index: 20; transition: opacity 1s ease; }

        #play-btn { background: transparent; border: 2px solid var(--accent-color); border-radius: 50%; width: 80px; height: 80px; color: var(--accent-color); font-size: 30px; cursor: pointer; box-shadow: 0 0 15px var(--accent-color); transition: 0.3s; }
        #play-btn:hover { background: var(--accent-color); color: white; box-shadow: 0 0 30px var(--accent-color); }

        /* --- CSS Banner tương tác với Dây Xích --- */
        #hanging-banner-container {
            position: absolute;
            top: -10px; 
            left: 40px; 
            z-index: 10;
            transform-origin: top center; 
            animation: sway 4s ease-in-out infinite; 
            opacity: 0; 
            transition: opacity 1.5s ease 0.5s, transform 0.1s linear; /* Thêm transition transform để trả về mượt hơn */
            pointer-events: none; 
            cursor: grab;
        }

        #hanging-banner-container:active {
            cursor: grabbing;
        }

        /* Định nghĩa mắt xích nhỏ */
        .banner-chain {
            position: absolute;
            top: 0;
            width: 4px; /* Dây xích mảnh */
            height: 60px; /* Chiều dài mặc định khi căng */
            /* Tạo hình mắt xích bằng gradient */
            background-image: repeating-linear-gradient(
                to bottom,
                var(--chain-color),
                var(--chain-color) 3px,
                transparent 3px,
                transparent 5px,
                var(--chain-dark) 5px,
                var(--chain-dark) 8px
            );
            border-radius: 2px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            /* Transition để tạo hiệu ứng chùng dây mượt mà */
            transition: height 0.3s ease-out, transform 0.3s ease-out, top 0.3s ease-out;
            transform-origin: top center;
        }
        
        .banner-chain.left { left: 15%; }
        .banner-chain.right { right: 15%; }

        /* --- Trạng thái DÂY CHÙNG ( Slack ) khi đang tương tác --- */
        #hanging-banner-container.is-slack .banner-chain {
            height: 80px; /* Dây dài ra */
            top: -5px; /* Nhích lên chút để tạo cảm giác chùng ở đỉnh */
        }
        
        /* Làm dây xích cong vào trong */
        #hanging-banner-container.is-slack .banner-chain.left {
            transform: rotate(15deg);
        }
        #hanging-banner-container.is-slack .banner-chain.right {
            transform: rotate(-15deg);
        }

        /* Khung bảng */
        #hanging-banner-content {
            /* Margin-top ban đầu chừa chỗ cho dây căng */
            margin-top: 58px; 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 15px 35px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); 
            text-align: center;
            user-select: none; 
            /* Transition margin để bảng nhún lên xuống khi dây chùng/căng */
            transition: margin-top 0.3s ease-out;
        }
        
        /* Khi dây chùng, bảng nhún lên trên một chút */
        #hanging-banner-container.is-slack #hanging-banner-content {
            margin-top: 50px;
        }

        #hanging-banner-content h1 {
            font-family: 'Bangers', cursive;
            color: #f0f0f0; 
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
        }

        #hanging-banner-content p {
            color: #bbb;
            margin: 5px 0 0 0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Đồng hồ Live */
        #live-clock {
            font-family: 'Segoe UI', monospace;
            font-size: 22px;
            font-weight: bold;
            color: var(--secondary-color);
            margin-top: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }

        /* --- CSS Player --- */
        #player-wrapper { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; width: 750px; max-width: 95%; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }

        .controls-row { display: flex; align-items: center; gap: 50px; margin-bottom: 30px; }

        .disc-container { transition: transform 0.5s ease; }

        #disc-img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid rgba(255,255,255,0.2); cursor: pointer; transition: box-shadow 0.3s; box-shadow: 0 0 25px rgba(255,255,255,0.3); object-fit: cover; animation: spin 4s linear infinite; animation-play-state: paused; display: block; }
        .is-spinning { animation-play-state: running !important; }
        .skip-icon { width: 35px; height: 35px; fill: #aaa; cursor: pointer; transition: 0.3s; }
        .skip-icon:hover { fill: var(--accent-color); }

        input[type="range"] { -webkit-appearance: none; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; opacity: 0; transition: 0.2s; }
        #player-wrapper:hover input[type="range"]::-webkit-slider-thumb { opacity: 1; }

        .time-text { color: white; font-size: 12px; min-width: 35px; text-align: center; }
        .speaker-icon { width: 24px; height: 24px; fill: none; stroke: #aaa; stroke-width: 2; transition: 0.3s; }
        #volume-wrapper:hover .speaker-icon { stroke: var(--secondary-color); }
        #volume-slider-container { width: 0; overflow: hidden; transition: 0.4s; }
        #volume-wrapper:hover #volume-slider-container { width: 100px; margin-left: 10px; }
        #volume-slider { width: 100px; }

        #track-info-box { position: absolute; bottom: 30px; left: 40px; z-index: 5; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-left: 4px solid var(--accent-color); border-radius: 8px; padding: 15px 25px; min-width: 200px; max-width: 300px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); opacity: 0; pointer-events: none; transition: opacity 1.5s ease, transform 1.5s ease; transform: translateY(10px); }
        .track-title { color: #fff; font-size: 16px; font-weight: 600; margin: 0 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }
        .track-artist { color: rgba(255, 255, 255, 0.6); font-size: 13px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #social-links-box { position: absolute; bottom: 30px; right: 40px; z-index: 5; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-right: 4px solid var(--secondary-color); border-radius: 8px; padding: 15px 25px; display: flex; align-items: center; gap: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); opacity: 0; pointer-events: none; transition: opacity 1.5s ease, transform 1.5s ease; transform: translateY(10px); }

        .social-link { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; color: rgba(255, 255, 255, 0.7); text-decoration: none; transition: all 0.3s ease; }
        .social-link svg { width: 100%; height: 100%; fill: currentColor; }
        .social-link.youtube:hover { color: #ff0000; filter: drop-shadow(0 0 10px #ff0000); transform: translateY(-3px) scale(1.1); }
        .social-link.steam:hover { color: #00adee; filter: drop-shadow(0 0 10px #00adee); transform: translateY(-3px) scale(1.1); }
        .social-link.spotify:hover { color: #1db954; filter: drop-shadow(0 0 10px #1db954); transform: translateY(-3px) scale(1.1); }
        .social-link.discord:hover { color: #5865F2; filter: drop-shadow(0 0 10px #5865F2); transform: translateY(-3px) scale(1.1); }
        .social-link.tiktok:hover { color: #fe2c55; filter: drop-shadow(0 0 10px #fe2c55); transform: translateY(-3px) scale(1.1); }

        #lyrics-box { position: absolute; top: 40px; right: 40px; z-index: 5; padding: 15px 25px; max-width: 90vw; min-height: 50px; opacity: 0; pointer-events: none; transition: opacity 1s ease; text-align: right; animation: levitate 3s ease-in-out infinite; }
        #lyrics-content { font-family: 'Bangers', cursive; font-size: 36px; font-weight: 400; letter-spacing: 3px; line-height: 1.4; white-space: nowrap; display: inline-block; color: #ffffff; -webkit-text-stroke: 1.5px #000000; opacity: 0; transform: translateY(8px); transition: opacity 0.15s ease-out, transform 0.15s ease-out; }
        #lyrics-content.show-lyric { opacity: 1; transform: translateY(0); text-shadow: 0 0 10px var(--accent-color), 0 0 25px var(--accent-color); }
        .sub-lyric { font-size: 22px; color: rgba(255, 255, 255, 0.85); -webkit-text-stroke: 1px #000000; letter-spacing: 2px; text-shadow: 0 0 8px var(--accent-color); }
    </style>
</head>

       function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            h = h < 10 ? '0' + h : h;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;
            document.getElementById('live-clock').textContent = `${h}:${m}:${s}`;
       }

        let currentTrackIndex = 0;

        const trackTitleEl = document.getElementById("track-title");
        const trackArtistEl = document.getElementById("track-artist");

        const overlay = document.getElementById("overlay");
        const playerWrapper = document.getElementById("player-wrapper");
        const progressSlider = document.getElementById("progress-slider");
        const volumeSlider = document.getElementById("volume-slider");
        const currentTimeEl = document.getElementById("current-time");
        const totalTimeEl = document.getElementById("total-time");
        const trackInfoBox = document.getElementById("track-info-box");
        const socialLinksBox = document.getElementById("social-links-box");
        
        const lyricsBox = document.getElementById("lyrics-box");
        const lyricsContent = document.getElementById("lyrics-content");
        
        // --- KẾT NỐI VỚI BANNER TREO ---
        const hangingBanner = document.getElementById("hanging-banner-container");
        
        // Vùng chứa đồng hồ (để tắt quay mặc định khi tương tác)
        let isDraggingBanner = false;
        let bannerAnchorX = 0;
        let bannerAnchorY = 0;

        hangingBanner.addEventListener('mousedown', (e) => {
            isDraggingBanner = true;
            // BẬT TRẠNG THÁI DÂY CHÙNG
            hangingBanner.classList.add('is-slack');

            // Lấy tâm điểm xoay của banner (top center)
            const rect = hangingBanner.getBoundingClientRect();
            bannerAnchorX = rect.left + rect.width / 2;
            bannerAnchorY = rect.top;

            hangingBanner.style.animation = 'none'; // Tắt animation đung đưa tự động
            hangingBanner.style.transition = 'opacity 1.5s ease 0.5s, transform 0.05s linear'; // Giảm transition để kéo theo tay mượt hơn
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDraggingBanner) return;
            
            const dx = e.clientX - bannerAnchorX;
            const dy = e.clientY - bannerAnchorY;
            
            // Tính góc xoay giữa điểm neo và con chuột
            let angle = Math.atan2(dx, dy) * (180 / Math.PI);
            
            // Giới hạn không cho xoay quá lố (tối đa 60 độ)
            angle = Math.max(-60, Math.min(60, angle)); 
            
            // Áp dụng góc xoay (-angle để xoay đúng chiều khi kéo)
            hangingBanner.style.transform = `rotate(${-angle}deg)`;
        });

        document.addEventListener('mouseup', () => {
            if (isDraggingBanner) {
                isDraggingBanner = false;
                // TẮT TRẠNG THÁI DÂY CHÙNG (Dây căng lại)
                hangingBanner.classList.remove('is-slack');
                
                // Trả về thẳng đứng với hiệu ứng mượt
                hangingBanner.style.transition = 'transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; // Thêm chút bounce khi trả về
                hangingBanner.style.transform = 'rotate(0deg)';
                
                // Mở lại hoạt ảnh đung đưa mặc định sau khi đã thả tay một lúc
                setTimeout(() => {
                    if (!isDraggingBanner) { 
                        hangingBanner.style.transition = 'opacity 1.5s ease 0.5s, transform 0.1s linear'; 
                        hangingBanner.style.animation = 'sway 4s ease-in-out infinite';
                    }
                }, 800); // Khớp với thời gian transition trả về
            }
        });

        function loadTrack(index) {
            const track = playlist[index];
            music.src = track.audio;
            video.src = track.video;
            discImg.src = track.disc;
            trackTitleEl.textContent = track.title;
            trackArtistEl.textContent = track.artist;
            
            currentLyricIndex = -1;
            lyricsContent.classList.remove("show-lyric");
            lyricsContent.innerHTML = "";
        }

        loadTrack(currentTrackIndex);

        function startExperience() {
            music.play();
            video.style.filter = "blur(0px)";
            overlay.style.opacity = "0";
            
            playerWrapper.style.opacity = "1"; 
            playerWrapper.style.pointerEvents = "auto";
            
            trackInfoBox.style.opacity = "1";
            trackInfoBox.style.pointerEvents = "auto";
            trackInfoBox.style.transform = "translateY(0)";

            socialLinksBox.style.opacity = "1";
            socialLinksBox.style.pointerEvents = "auto";
            socialLinksBox.style.transform = "translateY(0)";

            lyricsBox.style.opacity = "1";
            lyricsBox.style.transform = "translateY(0)";
            
            // Hiển thị và bật tương tác cho banner
            hangingBanner.style.opacity = "1";
            hangingBanner.style.pointerEvents = "auto";

            discImg.classList.add("is-spinning");
            setTimeout(() => overlay.style.display = "none", 1000);
        }

        function togglePlayPause() {
            if (music.paused) { 
                music.play(); 
                discImg.classList.add("is-spinning"); 
            } else { 
                music.pause(); 
                discImg.classList.remove("is-spinning"); 
            }
        }

        function nextTrack() {
            currentTrackIndex++;
            if (currentTrackIndex >= playlist.length) { currentTrackIndex = 0; }
            loadTrack(currentTrackIndex);
            playAfterChange();
        }

        function prevTrack() {
            currentTrackIndex--;
            if (currentTrackIndex < 0) { currentTrackIndex = playlist.length - 1; }
            loadTrack(currentTrackIndex);
            playAfterChange();
        }

        function playAfterChange() {
            if (overlay.style.display === "none") {
                music.play();
                discImg.classList.add("is-spinning");
            }
        }

        music.addEventListener("ended", nextTrack);

        music.addEventListener("timeupdate", () => {
            if(!music.duration) return;
            
            const percent = (music.currentTime / music.duration) * 100;
            progressSlider.value = percent;
            currentTimeEl.textContent = formatTime(music.currentTime);
            progressSlider.style.background = `linear-gradient(to right, var(--accent-color) ${percent}%, rgba(255, 255, 255, 0.1) ${percent}%)`;

            const trackLyrics = playlist[currentTrackIndex].lyrics;
            if (trackLyrics && trackLyrics.length > 0) {
                let activeIndex = -1;
                for (let i = 0; i < trackLyrics.length; i++) {
                    if (music.currentTime >= trackLyrics[i].time) {
                        activeIndex = i;
                    } else {
                        break;
                    }
                }
                
                if (activeIndex >= 0) {
                    if (activeIndex !== currentLyricIndex) {
                        currentLyricIndex = activeIndex;
                        if(trackLyrics[currentLyricIndex]) {
                            lyricsContent.innerHTML = trackLyrics[currentLyricIndex].text;
                            lyricsContent.classList.add("show-lyric");
                        }
                    }
                    
                    const currentLyricTime = trackLyrics[currentLyricIndex]?.time;
                    const nextLyric = trackLyrics[currentLyricIndex + 1];
                    
                    const maxDuration = trackLyrics[currentLyricIndex]?.duration || 4.5; 

                    if (music.currentTime - currentLyricTime >= maxDuration) {
                        lyricsContent.classList.remove("show-lyric");
                    } else if (nextLyric && (nextLyric.time - music.currentTime <= 0.2)) {
                        lyricsContent.classList.remove("show-lyric");
                    }
                }
            }
        });

        progressSlider.addEventListener("input", function() {
            music.currentTime = (this.value / 100) * music.duration;
            this.style.background = `linear-gradient(to right, var(--accent-color) ${this.value}%, rgba(255, 255, 255, 0.1) ${this.value}%)`;
            currentLyricIndex = -1; 
            lyricsContent.classList.remove("show-lyric");
        });

        volumeSlider.addEventListener("input", function() { music.volume = this.value; });
        function formatTime(s) { let m = Math.floor(s/60); let sec = Math.floor(s%60); return `${m}:${sec < 10 ? '0'+sec : sec}`; }
        music.addEventListener("loadedmetadata", () => totalTimeEl.textContent = formatTime(music.duration));
    </script>
