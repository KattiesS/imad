<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            position: relative; /* Thêm cái này để căn giữa nút bấm */
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Định dạng cho nút bật nhạc */
        #play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Căn nút ra đúng chính giữa màn hình */
            padding: 15px 30px;
            font-size: 20px;
            font-family: Arial, sans-serif;
            color: black;
            background-color: rgba(255, 255, 255, 0.8); /* Nền trắng hơi trong suốt */
            border: none;
            border-radius: 10px; /* Bo góc cho đẹp */
            cursor: pointer;
            z-index: 10; /* Đảm bảo nút nổi lên trên video */
            transition: 0.3s;
        }
        
        /* Hiệu ứng khi di chuột vào nút */
        #play-btn:hover {
            background-color: white;
            transform: translate(-50%, -50%) scale(1.1); /* Phóng to nút lên một chút */
        }
    </style>
</head>
<body>

    <!-- Video nền không tiếng -->
    <video src="marin1.mp4" autoplay loop muted playsinline></video>

    <!-- Thẻ Audio ẩn (Nhớ thay 'nhac.mp3' bằng tên file nhạc của bạn) -->
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <!-- Nút bấm -->
    <button id="play-btn" onclick="startExperience()">Bật nhạc 🎵</button>

    <!-- Đoạn Script để xử lý khi bấm nút -->
    <script>
        function startExperience() {
            var music = document.getElementById("bg-music");
            var btn = document.getElementById("play-btn");
            
            // Bắt đầu phát nhạc
            music.play();
            
            // Ẩn nút đi sau khi đã bấm
            btn.style.display = "none";
        }
    </script>

</body>
</html>
