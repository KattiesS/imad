<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu ứng Lời bài hát - Phong cách Hiện đại</title>
    <style>
        /* Cài đặt nền tối để làm nổi bật hiệu ứng phát sáng */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Khung chứa lời bài hát */
        .lyrics-container {
            width: 80%;
            max-width: 700px;
            text-align: left;
            position: relative;
            padding: 20px;
        }

        /* Hiệu ứng mặc định cho tất cả các dòng (Trạng thái ẩn/mờ) */
        .lyric-line {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.25);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            filter: blur(3px);
            transform: scale(0.9);
            transform-origin: left center;
            cursor: pointer;
        }

        /* Hiệu ứng cho dòng đang hát (Trạng thái hiển thị) */
        .lyric-line.active {
            color: rgba(255, 255, 255, 1);
            filter: blur(0);
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); /* Tạo độ glow nhẹ */
        }

        /* Hiệu ứng khi di chuột qua những dòng chưa hát */
        .lyric-line:hover:not(.active) {
            color: rgba(255, 255, 255, 0.6);
            filter: blur(1px);
        }
    </style>
</head>
<body>

    <div class="lyrics-container" id="lyrics">
        <div class="lyric-line active">Mình đã từng hứa bên nhau trọn đời</div>
        <div class="lyric-line">Nhưng sao giờ đây mỗi người một nơi</div>
        <div class="lyric-line">Kỷ niệm ngày xưa nhạt nhòa theo gió</div>
        <div class="lyric-line">Để lại trong tim một miền nỗi nhớ</div>
        <div class="lyric-line">Bước qua đời nhau như người xa lạ...</div>
    </div>

    <script>
        const lines = document.querySelectorAll('.lyric-line');
        let currentIndex = 0;

        // Tự động chuyển dòng hát mỗi 3.5 giây
        setInterval(() => {
            // Tắt hiệu ứng dòng hiện tại
            lines[currentIndex].classList.remove('active');
            
            // Chuyển sang dòng tiếp theo (nếu hết thì quay lại từ đầu)
            currentIndex = (currentIndex + 1) % lines.length;
            
            // Bật hiệu ứng cho dòng mới
            lines[currentIndex].classList.add('active');
        }, 3500);

        // Chức năng phụ: Cho phép click chuột vào dòng bất kỳ để nhảy lời
        lines.forEach((line, index) => {
            line.addEventListener('click', () => {
                lines[currentIndex].classList.remove('active');
                currentIndex = index;
                line.classList.add('active');
            });
        });
    </script>

</body>
</html>
