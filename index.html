<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        
        /* Video nền */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); 
            filter: blur(25px); 
            transition: filter 1.5s ease; 
        }

        /* Lớp phủ màn hình lúc chưa bấm */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        /* Nút Play/Mở dạng hình tròn */
        #play-btn {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: white;
            font-size: 35px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 8px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        #play-btn:hover {
            background-color: white;
            color: black;
            transform: scale(1.1);
        }

        /* ------ CSS MỚI CHO THANH ÂM LƯỢNG ------ */
        #volume-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 5;
            
            /* Ban đầu ẩn đi */
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        #volume-icon {
            font-size: 20px;
            color: white;
        }

        #volume-slider {
            width: 100px;
            cursor: pointer;
            accent-color: white; /* Đổi màu thanh kéo thành trắng cho sang */
        }
    </style>
</head>
<body>

    <!-- Video nền -->
    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>

    <!-- Thẻ Audio ẩn -->
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <!-- Lớp phủ chứa nút bấm -->
    <div id="overlay">
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <!-- ------ KHUNG CHỈNH ÂM LƯỢNG MỚI ------ -->
    <div id="volume-container">
        <span id="volume-icon">🔊</span>
        <!-- Thanh kéo: min là 0 (tắt tiếng), max là 1 (to nhất) -->
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
    </div>

    <!-- Script xử lý hiệu ứng và âm lượng -->
    <script>
        var music = document.getElementById("bg-music");
        var video = document.getElementById("bg-video");
        var overlay = document.getElementById("overlay");
        var volumeContainer = document.getElementById("volume-container");
        var volumeSlider = document.getElementById("volume-slider");
        var volumeIcon = document.getElementById("volume-icon");

        // Hàm chạy khi bấm nút Play
        function startExperience() {
            music.play();
            video.style.filter = "blur(0px)";
            overlay.style.opacity = "0";
            
            // Hiện thanh chỉnh âm lượng lên
            volumeContainer.style.opacity = "1";
            volumeContainer.style.pointerEvents = "auto";
            
            setTimeout(function() {
                overlay.style.display = "none";
            }, 1000);
        }

        // Lệnh bắt sự kiện khi bạn kéo thanh âm lượng
        volumeSlider.addEventListener("input", function() {
            // Chỉnh âm lượng nhạc bằng giá trị của thanh kéo
            music.volume = this.value;
            
            // Đổi icon loa cho sinh động
            if (this.value == 0) {
                volumeIcon.textContent = "🔇"; // Tắt tiếng
            } else if (this.value < 0.5) {
                volumeIcon.textContent = "🔉"; // Loa nhỏ
            } else {
                volumeIcon.textContent = "🔊"; // Loa to
            }
        });
    </script>

</body>
</html>
