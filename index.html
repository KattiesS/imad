<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web của tôi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        
        /* Video nền */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.1); 
            filter: blur(25px); 
            transition: filter 1.5s ease; 
        }

        /* Lớp phủ màn hình lúc chưa bấm */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Nền đen mờ đằng sau nút Play */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s ease;
        }

        /* Nút Play/Mở dạng hình tròn */
        #play-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 35px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-left: 8px;
            backdrop-filter: blur(10px);
            transition: 0.4s;
        }
        
        #play-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* ----- CSS MỚI: THANH ÂM LƯỢNG DỌC & KÍNH MỜ ----- */
        #volume-container {
            position: absolute;
            top: 50%; /* Đẩy xuống giữa màn hình */
            right: 40px; /* Cách mép phải 40px */
            transform: translateY(-50%); /* Cân bằng chuẩn xác ở giữa */
            
            display: flex;
            flex-direction: column; /* Đổi thành xếp dọc (icon nằm trên thanh kéo) */
            align-items: center;
            gap: 15px;
            
            /* Hiệu ứng kính mờ (Glassmorphism) */
            background-color: rgba(255, 255, 255, 0.05); /* Nền cực kỳ trong suốt */
            border: 1px solid rgba(255, 255, 255, 0.15); /* Viền trắng siêu mỏng */
            padding: 20px 10px;
            border-radius: 40px; /* Bo góc dài dạng viên thuốc */
            backdrop-filter: blur(12px); /* Làm mờ cảnh video phía sau thanh loa */
            z-index: 5;
            
            /* Ban đầu ẩn đi */
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        #volume-icon {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.6); /* Icon màu trắng trong suốt */
            user-select: none;
            margin-bottom: 5px;
        }

        #volume-slider {
            -webkit-appearance: slider-vertical; /* Ép thanh trượt hiển thị dọc trên Chrome/Edge/Safari */
            appearance: slider-vertical; 
            width: 6px; /* Làm thanh trượt thon gọn lại */
            height: 120px; /* Chiều dài của thanh kéo */
            cursor: pointer;
            accent-color: rgba(255, 255, 255, 0.8); /* Màu vạch kéo cũng trong suốt nhẹ */
        }
    </style>
</head>
<body>

    <!-- Video nền -->
    <video id="bg-video" src="marin1.mp4" autoplay loop muted playsinline></video>

    <!-- Thẻ Audio ẩn -->
    <audio id="bg-music" src="nhac.mp3" loop></audio>

    <!-- Lớp phủ chứa nút bấm -->
    <div id="overlay">
        <button id="play-btn" onclick="startExperience()">▶</button>
    </div>

    <!-- ----- GIAO DIỆN THANH ÂM LƯỢNG ----- -->
    <div id="volume-container">
        <span id="volume-icon">🔊</span>
        <!-- Thêm thuộc tính orient="vertical" để hỗ trợ tốt hơn cho Firefox -->
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" orient="vertical">
    </div>

    <!-- Script xử lý hiệu ứng -->
    <script>
        var music = document.getElementById("bg-music");
        var video = document.getElementById("bg-video");
        var overlay = document.getElementById("overlay");
        
        var volumeContainer = document.getElementById("volume-container");
        var volumeSlider = document.getElementById("volume-slider");
        var volumeIcon = document.getElementById("volume-icon");

        function startExperience() {
            music.play();
            video.style.filter = "blur(0px)";
            overlay.style.opacity = "0";

            // Hiện thanh âm lượng lên
            volumeContainer.style.opacity = "1";
            volumeContainer.style.pointerEvents = "auto";
            
            setTimeout(function() {
                overlay.style.display = "none";
            }, 1000);
        }

        // Lệnh xử lý khi kéo thanh âm lượng
        volumeSlider.addEventListener("input", function() {
            music.volume = this.value;
            
            if (this.value == 0) {
                volumeIcon.textContent = "🔇";
            } else if (this.value < 0.5) {
                volumeIcon.textContent = "🔉";
            } else {
                volumeIcon.textContent = "🔊";
            }
        });
    </script>

</body>
</html>
